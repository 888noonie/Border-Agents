<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-labelledby="title desc">
  <title id="title">Border Agents workspace with Claw</title>
  <desc id="desc">A clean productivity workspace screenshot showing Border Agents with Claw, a red crab agent, peeking from the right screen border.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcff"/>
      <stop offset="0.48" stop-color="#f7fbf8"/>
      <stop offset="1" stop-color="#fff8f3"/>
    </linearGradient>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f7fb"/>
    </linearGradient>
    <linearGradient id="editor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f9fb"/>
    </linearGradient>
    <linearGradient id="sidePanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f8ff"/>
      <stop offset="1" stop-color="#fdf8f4"/>
    </linearGradient>
    <linearGradient id="crabShell" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#ff7b72"/>
      <stop offset="0.55" stop-color="#ff4d4d"/>
      <stop offset="1" stop-color="#d92632"/>
    </linearGradient>
    <linearGradient id="crabClaw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8c7e"/>
      <stop offset="0.62" stop-color="#ff4d4d"/>
      <stop offset="1" stop-color="#c71f30"/>
    </linearGradient>
    <linearGradient id="owl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b89cff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="fox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb56f"/>
      <stop offset="1" stop-color="#ef6a3a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#22304a" flood-opacity="0.16"/>
    </filter>
    <filter id="tightShadow" x="-20%" y="-20%" width="140%" height="140%">
