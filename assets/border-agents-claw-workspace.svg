      <text x="2555" y="979" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="25" font-weight="760" fill="#263748">Blocked preserved</text>
      <text x="2555" y="1021" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="600" fill="#748195">kept in receipt ledger</text>
