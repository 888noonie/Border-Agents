    <rect x="1050" y="398" width="1300" height="1450" rx="24" fill="#ffffff" stroke="#e0e7ef"/>
    <rect x="1050" y="398" width="1300" height="86" rx="24" fill="#fbfcfe"/>
    <path d="M1050 484h1300" stroke="#e1e8f0" stroke-width="2"/>
    <text x="1110" y="452" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="27" font-weight="760" fill="#43516a">prompt-renderer.ts</text>
    <g font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="29" fill="#536177">
      <text x="1115" y="560">01  const frame = grader.grade(results, purpose);</text>
      <text x="1115" y="630">02  const receipt = frame.receipt;</text>
      <text x="1115" y="700">03  renderer.annotated(frame);</text>
      <text x="1115" y="770">04</text>
      <text x="1115" y="840">05  trusted.map(packet =&gt; packet.content)</text>
      <text x="1115" y="910">06  limited.map(packet =&gt; constraints(packet))</text>
      <text x="1115" y="980">07  ledger.preserve(blocked)</text>
      <text x="1115" y="1050">08</text>
      <text x="1115" y="1120">09  // Same vector results, different purpose.</text>
      <text x="1115" y="1190">10  // Authorization stays inspectable.</text>
    </g>
