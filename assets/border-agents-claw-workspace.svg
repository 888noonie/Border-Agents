      <text x="2555" y="859" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="600" fill="#748195">render with constraints</text>
      <rect x="2455" y="924" width="580" height="128" rx="24" fill="#ffffff" stroke="#dfe7ef"/>
