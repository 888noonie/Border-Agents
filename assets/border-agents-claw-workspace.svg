      <text x="2555" y="697" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="600" fill="#748195">may influence prompt context</text>
      <rect x="2455" y="762" width="580" height="128" rx="24" fill="#ffffff" stroke="#dfe7ef"/>
      <circle cx="2518" cy="826" r="18" fill="#e2a52d"/>
