<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Border Buddies</title>
    <style>
      :root {
        color: #182033;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        width: 320px;
        margin: 0;
        background: linear-gradient(145deg, #fbfdff, #f2fbff);
      }

      main {
        padding: 18px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 18px;
      }

      p {
        margin: 0 0 16px;
        color: #637083;
        font-size: 12px;
        line-height: 1.4;
      }

      label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 0;
        border-top: 1px solid #dce8f4;
        font-size: 13px;
        font-weight: 650;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #2f7dff;
      }

      input[type="url"] {
        box-sizing: border-box;
        width: 100%;
        margin-top: 8px;
        border: 1px solid #cbddec;
        border-radius: 10px;
        padding: 9px 10px;
        color: #182033;
        font: inherit;
        font-size: 12px;
      }

      button {
        width: 100%;
        margin-top: 14px;
        border: 0;
        border-radius: 12px;
        padding: 10px 12px;
        background: #182033;
        color: white;
        font: inherit;
        font-size: 13px;
        font-weight: 760;
        cursor: pointer;
      }

      .buddy-card {
        margin: 14px 0;
        border: 1px solid #cfe3f6;
        border-radius: 16px;
        padding: 12px;
        background: white;
        box-shadow: 0 12px 30px rgb(8 17 31 / 0.08);
      }

      .buddy-card strong {
        color: #174de0;
      }

      .field-stack {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .field-stack span {
        color: #637083;
        font-size: 11px;
        font-weight: 720;
      }

      select,
      input[type="text"] {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #cbddec;
        border-radius: 10px;
        padding: 9px 10px;
        color: #182033;
        font: inherit;
        font-size: 12px;
      }

      .status {
        min-height: 18px;
        margin-top: 10px;
        color: #287452;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Border Buddies</h1>
      <p>Hermes is your Grok-powered browser companion. Keep him tucked, drag him free, or let him whisper tiny useful signals.</p>

      <label>
        Enable buddies
        <input id="enabled" type="checkbox" />
      </label>

      <div class="buddy-card">
        <strong>Hermes · Grok</strong>
        <label>
          Show Hermes
          <input id="hermesEnabled" type="checkbox" />
        </label>
        <div class="field-stack">
          <span>Platform</span>
          <select id="provider"></select>
          <span>Model</span>
          <input id="modelLabel" type="text" />
          <span>Memory</span>
          <select id="memoryMode"></select>
        </div>
        <label>
          Agent action
          <input id="allowAction" type="checkbox" />
        </label>
        <label>
          External share
          <input id="allowExternalShare" type="checkbox" />
        </label>
      </div>

      <label>
        Desktop sync
        <input id="websocketSync" type="checkbox" />
      </label>

      <input id="websocketUrl" type="url" aria-label="WebSocket URL" />

      <button id="showHermes" type="button">Summon Hermes</button>
      <div class="status" id="status"></div>
    </main>
    <script src="profiles.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
